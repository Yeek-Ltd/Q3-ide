name: Update Feed

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(gh release list --repo "$REPO" --json tagName -q '.[0].tagName')
          fi
          VERSION="${TAG#v}"
          COMMIT=$(git rev-list -n 1 "$TAG")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Download setup exe and compute hash
        id: hash
        run: |
          curl -L -o Q3IDESetup.exe "https://github.com/${{ github.repository }}/releases/latest/download/Q3IDESetup.exe"
          SHA256=$(sha256sum Q3IDESetup.exe | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          TIMESTAMP=$(date +%s)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Generate update feed files for all previous releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_VERSION: ${{ steps.release.outputs.version }}
          NEW_COMMIT: ${{ steps.release.outputs.commit }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
          TIMESTAMP: ${{ steps.hash.outputs.timestamp }}
        run: |
          mkdir -p docs/api/update/win32-x64/stable
          touch .nojekyll

          # Get all previous release tags (excluding current)
          PREV_TAGS=$(gh release list --repo "$REPO" --json tagName -q '.[].tagName' | grep -v "^${{ steps.release.outputs.tag }}$" || true)

          for PREV_TAG in $PREV_TAGS; do
            PREV_COMMIT=$(git rev-list -n 1 "$PREV_TAG" 2>/dev/null || echo "")
            if [ -z "$PREV_COMMIT" ]; then
              continue
            fi

            # Skip if this is the current release's commit (no update needed)
            if [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
              continue
            fi

            # Create update file for this previous commit
            # Users running this commit will see an update is available
            cat > "docs/api/update/win32-x64/stable/$PREV_COMMIT" << ENDJSON
          {
            "url": "https://github.com/$REPO/releases/latest/download/Q3IDESetup.exe",
            "name": "$NEW_VERSION",
            "version": "$NEW_VERSION",
            "productVersion": "$NEW_VERSION",
            "hash": "",
            "sha256hash": "$SHA256",
            "timestamp": $TIMESTAMP
          }
          ENDJSON
            echo "Created update file for commit $PREV_COMMIT (from tag $PREV_TAG)"
          done

          # Update latest.json for reference
          cat > docs/api/update/win32-x64/stable/latest.json << ENDJSON
          {
            "url": "https://github.com/$REPO/releases/latest/download/Q3IDESetup.exe",
            "name": "$NEW_VERSION",
            "version": "$NEW_VERSION",
            "productVersion": "$NEW_VERSION",
            "hash": "",
            "sha256hash": "$SHA256",
            "timestamp": $TIMESTAMP
          }
          ENDJSON

          # Do NOT create a file for the current release's commit
          # When GitHub Pages returns 404 for it, VS Code treats it as "no update available"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll docs/api/update/win32-x64/stable/
          git commit -m "Update feed for ${{ steps.release.outputs.tag }} (${{ steps.release.outputs.commit }})" || echo "No changes"
          git push origin main
